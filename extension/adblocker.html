  <title>AdGuard Popup</title>

    rel="stylesheet">

  <style>
    :root {
      /* Theme Palette - Light Mode */
      --bg-page: #ffffff;
      --bg-tabs: #f6f6f6;
      --bg-tabs-active: #ffffff;
      --text-main: #3d3d3d;
      --text-desc: #5b5b5b;
      --link-blue: #5b5b5b;

      /* Original Action Colors adapted for Light Mode */
      --icon-block: #f67247;
      --icon-log: #67b279;
      --icon-report: #d58500;
      --icon-gray: #7f7f7f;

      --green-main: #67b279;
      --t3: 0.3s ease;
      --popup-width: 320px;
      --popup-height: 560px;
    }

    *,
    *:before,
    *:after {
      box-sizing: border-box;
    }

    html {
      font-size: 10px;
    }

    body {
      margin: 0;
      font-size: 1.6rem;
      line-height: 1.4;
      font-family: 'Roboto Flex', sans-serif;
      width: var(--popup-width);
      height: var(--popup-height);
      color: var(--text-main);
      background-color: var(--bg-page);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Apply Roboto Flex to all interactive elements */
    button,
    input,
    a,
    span,
    div {
      font-family: 'Roboto Flex', sans-serif;
    }

    .popup {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Header Section */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 16px 17px 24px;
      flex-shrink: 0;
    }

    .icon--logo {
      width: 107px;
      height: 24px;
      color: var(--text-main);
    }

    .popup-header__buttons {
      display: flex;
    }

    .popup-header__button {
      width: 24px;
      height: 24px;
      margin-left: 16px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-desc);
      transition: var(--t3);
    }

    .popup-header__button:hover {
      color: var(--green-main);
    }

    /* Main Content */
    .main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
    }

    .main__header {
      width: 100%;
      text-align: center;
    }

    .main__header--current-site {
      font-size: 14px;
      color: var(--text-main);
    }

    .main__header--current-status--title {
      font-size: 2.8rem;
      font-weight: 700;
      margin: 4px 0;
    }

    .main__header--current-status--subtitle {
      color: var(--text-desc);
      font-size: 14px;
    }

    /* Switcher - Restored Spacing */
    .switcher {
      position: relative;
      cursor: pointer;
      min-height: 60px;
      height: 60px;
      padding: 0 5px;
      background: transparent;
      border: none;
      margin: 15px 0;
    }

    .switcher__track {
      width: 80px;
      height: 30px;
      border-radius: 100px;
      background-color: var(--green-main);
      opacity: 0.8;
    }

    .switcher__handle {
      position: absolute;
      width: 50px;
      height: 50px;
      top: 5px;
      right: 5px;
      border-radius: 50%;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
    }

    .switcher__icon--on {
      color: var(--green-main);
    }

    /* Link Styling */
    .main__cta {
      width: 100%;
      text-align: center;
    }

    .main__cta--link {
      font-size: 14px;
      color: var(--link-blue);
      text-decoration: underline;
      transition: var(--t3);
    }

    .main__cta--link:hover {
      color: var(--text-main);
    }

    /* Tabs UI */
    .tabs__panel {
      padding: 8px;
      width: 100%;
    }

    .tabs__panel-wrapper {
      display: flex;
      background: var(--bg-tabs);
      padding: 4px;
      border-radius: 12px;
      column-gap: 8px;
    }

    .tabs__tab {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: var(--text-desc);
      font-weight: 400;
      font-size: 1.6rem;
    }

    .tabs__tab--active {
      background-color: var(--bg-page);
      color: var(--text-main);
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.12);
    }

    /* Action Buttons */
    .actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px 0;
    }

    .action {
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-main);
      transition: background 0.2s;
    }

    .action:hover {
      background-color: var(--bg-tabs);
    }

    .action__title {
      padding-left: 12px;
      font-size: 1.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Footer */
    .footer {
      height: 48px;
      background: var(--bg-tabs);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      margin-top: auto;
    }

    .footer__text {
      font-size: 1.3rem;
      color: var(--text-desc);
    }

    .footer__platforms {
      display: flex;
      gap: 16px;
    }

    .footer__link {
      color: var(--text-desc);
      transition: color 0.2s;
      text-decoration: none;
    }

    .footer__link:hover {
      color: var(--text-main);
    }

    .icon {
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .icon--24 {
      width: 24px;
      height: 24px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

          <h1 class="main__header--current-status--title">Blokkolva: 2</h1>
          <div class="main__header--current-status--subtitle">Összes blokkolva: 14</div>
        </div>

        <div class="main__control">
          <button type="button" class="switcher" title="Védelem kapcsoló">
            <div class="switcher__track"></div>
            <div class="switcher__handle">
              <svg class="icon icon--24 switcher__icon--on" aria-hidden="true">
                <use xlink:href="#checkmark-sw"></use>
              </svg>
            </div>
          </button>
        </div>

        <div class="main__cta">
          <a href="#" class="main__cta--link">Hogyan fokozható a védelem</a>
        </div>
      </main>
    </div>

    <!-- Tabs UI -->
    <div class="tabs">
      <div class="tabs__panel">
        <div class="tabs__panel-wrapper">
          <button type="button" class="tabs__tab tabs__tab--active">Műveletek</button>
          <button type="button" class="tabs__tab">Statisztikák</button>
        </div>
      </div>
    </div>

    <!-- Actions List -->
    <div class="actions">
      <button type="button" class="action">
        <svg class="icon icon--24" style="color:var(--icon-block)" aria-hidden="true">
          <use xlink:href="#block-ad"></use>
        </svg>
        <span class="action__title">Hirdetések manuális blokkolása</span>
      </button>
      <button type="button" class="action">
        <svg class="icon icon--24" style="color:var(--icon-log)" aria-hidden="true">
          <use xlink:href="#sandwich"></use>
        </svg>
        <span class="action__title">Szűrési napló megnyitása</span>
      </button>
      <button type="button" class="action">
        <svg class="icon icon--24" style="color:var(--icon-report)" aria-hidden="true">
          <use xlink:href="#thumb-down"></use>
        </svg>
        <span class="action__title">Probléma bejelentése</span>
      </button>
      <button type="button" class="action">
        <svg class="icon icon--24" style="color:var(--icon-gray)" aria-hidden="true">
          <use xlink:href="#info"></use>
        </svg>
        <span class="action__title">Webhely biztonságának ellenőrzése</span>
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__text">Védje meg mobil eszközét</div>
      <div class="footer__platforms">
        <a href="#" class="footer__link" aria-label="AdGuard for iOS"><svg class="icon icon--24" aria-hidden="true">
            <use xlink:href="#apple"></use>
          </svg></a>
        <a href="#" class="footer__link" aria-label="AdGuard for Android"><svg class="icon icon--24" aria-hidden="true">
            <use xlink:href="#android"></use>
          </svg></a>
      </div>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="adblocker.js"></script>
